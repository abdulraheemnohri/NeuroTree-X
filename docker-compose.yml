version: '3.8'

services:
  api_gateway:
    build:
      context: ./backend
      dockerfile: api_gateway/Dockerfile
    ports:
      - "8000:8000"
    networks:
      - neuro-net

  # Core Databases
  neo4j:
    image: neo4j:latest
    ports: ["7474:7474", "7687:7687"]
    environment: [NEO4J_AUTH=neo4j/password]
    networks: [neuro-net]

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    networks: [neuro-net]

  redis:
    image: redis:latest
    networks: [neuro-net]

  # Microservices (Simulated in this compose for scale)
  agent_factory:
    build: { context: ./backend, dockerfile: api_gateway/Dockerfile }
    command: uvicorn agent_factory.main:app --host 0.0.0.0 --port 8000
    networks: [neuro-net]

  research_engine:
    build: { context: ./backend, dockerfile: api_gateway/Dockerfile }
    command: uvicorn research_engine.main:app --host 0.0.0.0 --port 8000
    networks: [neuro-net]

  knowledge_orchestrator:
    build: { context: ./backend, dockerfile: api_gateway/Dockerfile }
    command: uvicorn knowledge_orchestrator.main:app --host 0.0.0.0 --port 8000
    networks: [neuro-net]

networks:
  neuro-net:
    driver: bridge
